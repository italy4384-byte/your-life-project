<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>你的人生 - 全人成长赋能生态系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <style>
    /* 隐藏左侧原标题 */
    .sidebar h1.app-name {
      display: none !important;
    }
    /* 标题容器：强制换行+右对齐 */
    .title-container {
      display: block !important;
      text-align: right !important;
      margin-bottom: 40px !important;
      width: 100% !important;
    }
    /* 主标题样式 */
    .title-main {
      font-size: 48px !important;
      font-weight: 900 !important;
      color: #2c3e50 !important;
      display: block !important; /* 强制独占一行 */
    }
    /* 副标题样式（小一号+单独一行） */
    .title-sub {
      font-size: 32px !important;
      font-weight: 600 !important;
      color: #4a6583 !important;
      display: block !important; /* 强制换行，不跟主标题同列 */
      margin-top: 5px !important;
    }
    /* 侧边栏样式 */
    .sidebar {
      width: 280px !important;
      padding: 20px 10px !important;
      background: #f8f9fa;
    }
    /* 右侧内容：极窄页边距+大字体+自适应 */
    .content {
      margin-left: 300px !important;
      padding: 40px 0.5% !important; /* 页边距收窄到0.5%（极致窄） */
      font-size: 24px !important;
      line-height: 2.5;
      letter-spacing: 1.5px;
      max-width: calc(100% - 310px); /* 适配极窄边距 */
      box-sizing: border-box;
    }
    /* 其他标题样式 */
    .content h2 {
      font-size: 40px !important;
      font-weight: 800 !important;
      margin: 25px 0 !important;
      color: #34495e;
      border-bottom: 3px solid #eee;
      padding-bottom: 10px;
    }
    .content h3 {
      font-size: 32px !important;
      font-weight: 700 !important;
      margin: 20px 0 !important;
      color: #4a6583;
    }
    /* 链接、列表样式 */
    .content a {
      font-size: 24px !important;
      color: #ff5722 !important;
      text-decoration: underline;
    }
    .content p, .content ul, .content ol {
      margin-bottom: 25px !important;
      width: 100%;
    }
    .content li {
      margin: 15px 0 !important;
    }
    /* 移动端自适应（极窄边距+标题适配） */
    @media (max-width: 992px) {
      .sidebar {
        width: 220px !important;
      }
      .content {
        margin-left: 240px !important;
        max-width: calc(100% - 250px);
        padding: 30px 0.3% !important;
        font-size: 20px !important;
      }
      .title-main { font-size: 40px !important; }
      .title-sub { font-size: 28px !important; }
      .content h2 { font-size: 32px !important; }
      .content h3 { font-size: 28px !important; }
    }
    @media (max-width: 768px) {
      .sidebar {
        width: 100% !important;
        height: auto !important;
        position: relative !important;
      }
      .content {
        margin-left: 0 !important;
        max-width: 100% !important;
        padding: 20px 0.2% !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script>
    window.$docsify = {
      name: '', // 清空左侧标题
      repo: 'https://github.com/italy4384-byte/your-life-project',
      loadSidebar: true,
      subMaxLevel: 2,
      // 强制拆分标题为两行（彻底换行）
      markdown: {
        renderer: {
          heading: function(text, level) {
            if (level === 1 && text.includes('你的人生 - 全人成长赋能生态系统')) {
              return `<div class="title-container">
                <span class="title-main">你的人生</span>
                <span class="title-sub">- 全人成长赋能生态系统</span>
              </div>`;
            }
            return this.origin.heading.apply(this, arguments);
          }
        }
      }
    }
  </script>
</body>
</html>
