<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>你的人生 - 全人成长赋能生态系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <style>
    /* 全局风景背景图（覆盖整个页面） */
    body {
      background: url('https://picsum.photos/id/1036/1920/1080') no-repeat center center fixed !important;
      background-size: cover !important; /* 自适应铺满屏幕 */
      position: relative !important;
    }
    /* 背景遮罩：降低图片亮度，保证文字清晰 */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.85); /* 白色半透明遮罩，可调整透明度 */
      z-index: -1;
    }
    /* 隐藏左侧原标题 */
    .sidebar h1.app-name {
      display: none !important;
    }
    /* 侧边栏：半透明背景+阴影，突出层次感 */
    .sidebar {
      width: 280px !important;
      padding: 20px 10px !important;
      background: rgba(255, 255, 255, 0.9) !important; /* 半透明白色 */
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* 轻微阴影 */
    }
    /* 标题容器：整体居中，副标题单独右对齐 */
    .title-container {
      display: block !important;
      margin-bottom: 40px !important;
      width: 100% !important;
      text-align: center !important;
    }
    /* 主标题：居中展示+深色字体保证可读性 */
    .title-main {
      font-size: 48px !important;
      font-weight: 900 !important;
      color: #2c3e50 !important;
      display: block !important;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1); /* 轻微文字阴影 */
    }
    /* 副标题：更小一号+右对齐+单独一行 */
    .title-sub {
      font-size: 24px !important;
      font-weight: 600 !important;
      color: #4a6583 !important;
      display: block !important;
      text-align: right !important;
      margin-top: 5px !important;
      padding-right: 10px !important;
    }
    /* 右侧内容：半透明背景+无页边距+阴影 */
    .content {
      margin-left: 300px !important;
      padding: 40px 2% !important; /* 少量内边距保证文字不贴边 */
      font-size: 24px !important;
      line-height: 2.5;
      letter-spacing: 1.5px;
      max-width: calc(100% - 300px);
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.9) !important; /* 半透明白色内容区 */
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1); /* 内容区阴影 */
      border-radius: 8px; /* 轻微圆角更美观 */
    }
    /* 其他标题样式 */
    .content h2 {
      font-size: 40px !important;
      font-weight: 800 !important;
      margin: 25px 0 !important;
      color: #34495e !important;
      border-bottom: 3px solid #eee !important;
      padding-bottom: 10px !important;
    }
    .content h3 {
      font-size: 32px !important;
      font-weight: 700 !important;
      margin: 20px 0 !important;
      color: #4a6583 !important;
    }
    /* 链接、列表样式 */
    .content a {
      font-size: 24px !important;
      color: #ff5722 !important;
      text-decoration: underline !important;
    }
    .content p, .content ul, .content ol {
      margin-bottom: 25px !important;
      width: 100%;
      color: #2c3e50 !important; /* 深色文字保证可读性 */
    }
    .content li {
      margin: 15px 0 !important;
    }
    /* 移动端自适应 */
    @media (max-width: 992px) {
      .sidebar {
        width: 220px !important;
      }
      .content {
        margin-left: 240px !important;
        max-width: calc(100% - 240px);
        padding: 30px 2% !important;
        font-size: 20px !important;
      }
      .title-main { font-size: 40px !important; }
      .title-sub { font-size: 20px !important; }
      .content h2 { font-size: 32px !important; }
      .content h3 { font-size: 28px !important; }
    }
    @media (max-width: 768px) {
      .sidebar {
        width: 100% !important;
        height: auto !important;
        position: relative !important;
        margin-bottom: 20px !important;
      }
      .content {
        margin-left: 0 !important;
        max-width: 100% !important;
        padding: 20px 2% !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script>
    window.$docsify = {
      name: '', // 清空左侧标题
      repo: 'https://github.com/italy4384-byte/your-life-project',
      loadSidebar: true,
      subMaxLevel: 2,
      // 强制拆分标题为两行（居中+右对齐）
      markdown: {
        renderer: {
          heading: function(text, level) {
            if (level === 1 && text.includes('你的人生 - 全人成长赋能生态系统')) {
              return `<div class="title-container">
                <span class="title-main">你的人生</span>
                <span class="title-sub">- 全人成长赋能生态系统</span>
              </div>`;
            }
            return this.origin.heading.apply(this, arguments);
          }
        }
      }
    }
  </script>
</body>
</html>
