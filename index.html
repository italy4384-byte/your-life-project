<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>你的人生 - 全人成长赋能生态系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <style>
    /* 隐藏左侧标题 */
    .sidebar h1.app-name {
      display: none !important;
    }
    /* 侧边栏只保留导航，宽度自适应 */
    .sidebar {
      width: 280px !important;
      padding: 20px 10px !important;
      background: #f8f9fa;
    }
    /* 右侧内容：自适应布局+字体翻倍+均匀分布 */
    .content {
      margin-left: 300px !important;
      padding: 40px 5% !important;
      font-size: 24px !important; /* 基础字体再翻倍（原20px→24px） */
      line-height: 2.5; /* 行高适配大字体 */
      letter-spacing: 1.5px;
      max-width: calc(100% - 320px); /* 自适应页面宽度 */
      box-sizing: border-box;
    }
    /* 标题层级放大+加粗，自适应 */
    .content h1 {
      font-size: 48px !important;
      font-weight: 900 !important;
      margin: 30px 0 !important;
      color: #2c3e50;
    }
    .content h2 {
      font-size: 40px !important;
      font-weight: 800 !important;
      margin: 25px 0 !important;
      color: #34495e;
      border-bottom: 3px solid #eee;
      padding-bottom: 10px;
    }
    .content h3 {
      font-size: 32px !important;
      font-weight: 700 !important;
      margin: 20px 0 !important;
      color: #4a6583;
    }
    /* 链接、列表、段落自适应 */
    .content a {
      font-size: 24px !important;
      color: #ff5722 !important;
      text-decoration: underline;
    }
    .content p, .content ul, .content ol {
      margin-bottom: 25px !important;
      width: 100%;
    }
    .content li {
      margin: 15px 0 !important;
    }
    /* 移动端自适应（手机/平板） */
    @media (max-width: 992px) {
      .sidebar {
        width: 220px !important;
      }
      .content {
        margin-left: 240px !important;
        max-width: calc(100% - 260px);
        font-size: 20px !important;
      }
      .content h1 { font-size: 40px !important; }
      .content h2 { font-size: 32px !important; }
      .content h3 { font-size: 28px !important; }
    }
    @media (max-width: 768px) {
      .sidebar {
        width: 100% !important;
        height: auto !important;
        position: relative !important;
      }
      .content {
        margin-left: 0 !important;
        max-width: 100% !important;
        padding: 20px 3% !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script>
    window.$docsify = {
      name: '', // 清空左侧标题
      repo: 'https://github.com/italy4384-byte/your-life-project',
      loadSidebar: true,
      subMaxLevel: 2
    }
  </script>
</body>
</html>
