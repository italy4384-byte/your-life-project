<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>你的人生 - 全人成长赋能生态系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <style>
    /* 左侧竖排标题：大一倍+加粗+橙黄色 */
    .sidebar h1.app-name {
      font-size: 56px !important; /* 原28px → 翻倍56px */
      font-weight: 900 !important; /* 极致加粗 */
      writing-mode: vertical-rl; /* 竖排 */
      text-orientation: mixed;
      color: #ff9800 !important; /* 橙黄色 */
      padding: 20px 10px !important;
      margin: 0 !important;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 5px; /* 字间距更舒展 */
    }
    /* 侧边栏适配竖排大标题 */
    .sidebar {
      width: 80px !important; /* 加宽适配大字体 */
      padding-top: 0 !important;
      background: #f8f9fa; /* 侧边栏浅底色更协调 */
    }
    /* 右侧内容：字体大一倍+均匀分布+整体美观 */
    .content {
      margin-left: 100px !important; /* 适配侧边栏宽度 */
      font-size: 20px !important; /* 原16px → 翻倍20px（适配阅读） */
      line-height: 2.2; /* 行高均匀分布 */
      letter-spacing: 1px; /* 字间距更舒适 */
      padding: 30px 50px !important; /* 内边距更舒展 */
      max-width: 1000px; /* 限制宽度避免太宽 */
    }
    /* 右侧标题同步放大+加粗 */
    .content h1 { font-size: 36px !important; font-weight: 800 !important; }
    .content h2 { font-size: 30px !important; font-weight: 700 !important; }
    .content h3 { font-size: 26px !important; font-weight: 600 !important; }
    /* 链接样式优化 */
    .content a { font-size: 20px !important; color: #ff5722 !important; }
    /* 列表/段落间距均匀 */
    .content p, .content ul, .content ol {
      margin-bottom: 20px !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script>
    window.$docsify = {
      name: '你的人生',
      repo: 'https://github.com/italy4384-byte/your-life-project',
      loadSidebar: true,
      subMaxLevel: 2
    }
  </script>
</body>
</html>
